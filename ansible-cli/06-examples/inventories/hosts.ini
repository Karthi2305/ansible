
This repository uses a **static INI-style inventory**.

---

## 🧠 Inventory Grouping Concept

Grouping allows you to:
- Run playbooks against specific roles
- Apply different variables via `group_vars`
- Scale automation easily

---

## 📄 `hosts.ini` Example

```ini
# Web Servers
[web]
192.168.*.** ansible_user=ubuntu ansible_port=22 ansible_become=true

# Database Servers
[db]
192.168.**.* ansible_user=ubuntu ansible_port=22 ansible_become=true

# Windows Servers
[win]
65.2.xxx.xxx ansible_user=Administrator
ansible_password=********
ansible_connection=winrm
ansible_winrm_transport=basic
ansible_winrm_port=5986
ansible_winrm_server_cert_validation=ignore
